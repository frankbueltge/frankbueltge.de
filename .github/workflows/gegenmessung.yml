name: Gegenmessung nightly

# Ersetzt den GCP-Cloud-Run-Cron: läuft die vier Gegenmessungs-Pipelines auf GitHubs
# kostenlosen Runnern und committet die Daten zurück (→ Host-Rebuild). Kostenlos, ohne
# Anbieter-Sperren, host-unabhängig. Consensus + Pattern täglich; Tell + Correction montags.

on:
  schedule:
    - cron: '0 6 * * *' # täglich 06:00 UTC (nach den übrigen Pipelines)
  workflow_dispatch: {} # manuell auslösbar

permissions:
  contents: write

concurrency:
  group: gegenmessung
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle History → git pull --rebase im Commit-Schritt funktioniert
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Abhängigkeiten (Correction/Pattern)
        run: pip install --no-cache-dir "pandas>=2,<3" openpyxl numpy
      - name: Pipelines laufen
        run: |
          set -u
          DOW=$(date -u +%u) # 1 = Montag … 7 = Sonntag
          run () { echo "::group::$1"; python "$1" || echo "::warning::$1 fehlgeschlagen — übersprungen"; echo "::endgroup::"; }
          run pipelines/consensus/refresh.py
          run pipelines/pattern/refresh.py
          if [ "$DOW" = "1" ]; then
            run pipelines/tell/refresh.py
            run pipelines/revision/refresh.py
          fi
      - name: Committen
        run: |
          git config user.name "Gegenmessung"
          git config user.email "gegenmessung@frankbueltge.de"
          git add src/data/consensus src/data/pattern src/data/tell src/data/revision 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
            exit 0
          fi
          git commit -m "gegenmessung: nightly refresh ($(date -u +%F))"
          # Gegen Push-Races (parallele Cron-/Repo-Commits): rebasen + mehrfach versuchen.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Gepusht."; exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen, neu …"; sleep 5
          done
          echo "::error::Push nach 5 Versuchen fehlgeschlagen"; exit 1
