# .github/workflows/atelier-integrate.yml
# Zieht Ulysses' Atelier-Repo, integriert NUR erlaubte Pfade (Pfad-Grenze), validiert
# check/test/build und deployt nur bei Grün. Bei Rot: kein Deploy (letzter Stand bleibt),
# Feedback-Datei zurück in ihr Repo + Issue an Frank. v1 ist all-or-nothing (ein rotes
# Astro-Werk hält auch den Journal-Commit der Nacht zurück; sie bekommt Feedback und behebt
# es). Refinement (Journal/HTML immer, nur Astro gated) ist als Folgeausbau notiert.
name: Atelier integrate

on:
  # Seit Protokoll v4 (2026-07-18) ist Landung↔Site-Rebuild entkoppelt: das Engine-Repo
  # dispatcht nicht mehr. Der Cron ist der Regel-Takt; repository_dispatch bleibt als
  # manueller Hebel erhalten. Der Import bleibt publikationsneutral: works/ (historisch)
  # + projects/ nur mit gültigem, menschlich freigegebenem PUBLICATION.json (integrate.ts).
  repository_dispatch:
    types: [irrtum-landed]
  schedule:
    - cron: '0 3 * * *'   # 05:00 Berlin
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: atelier-integrate

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - name: Clone atelier repo
        # BOT_TOKEN, damit der Spiegel auch funktioniert, wenn das Engine-Repo privat ist
        # (auf privat gestellt 2026-07-23); ohne Token fällt er auf den anonymen Clone zurück.
        env:
          BOT_TOKEN: ${{ secrets.ATELIER_BOT_TOKEN }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${BOT_TOKEN}@github.com/frankbueltge/ulysses" /tmp/atelier
          else
            git clone --depth 1 https://github.com/frankbueltge/ulysses /tmp/atelier
          fi

      - name: Integrate works (html + astro + md) + sync journal/docs
        run: |
          # Voller Reset der generierten Werk-Ausgaben → die Seite spiegelt irrtum exakt
          # (entfernte/umbenannte Werke hinterlassen keine Orphans).
          rm -rf src/content/atelier/works src/components/atelier/werke src/pages/atelier/werke public/atelier/werke-html
          mkdir -p src/content/atelier/journal src/content/atelier/works src/components/atelier/werke
          touch src/components/atelier/werke/.gitkeep
          # Journal spiegeln (entfernt gelöschte Einträge)
          rsync -a --delete /tmp/atelier/journal/ src/content/atelier/journal/
          # v4-Projekt-Records spiegeln (Forschungslog, publikationsneutral): nur die
          # Markdown-Akten (SCORE/TRACE/DECISION/…), nie PUBLICATION.json, nie _template
          mkdir -p src/content/atelier/projects
          rsync -a --delete --exclude='_template' --include='*/' --include='*.md' --exclude='*' /tmp/atelier/projects/ src/content/atelier/projects/ 2>/dev/null || true
          # Markdown-Werke (fehlerkataster, genealogie, parry-problem …)
          cp /tmp/atelier/works/*.md src/content/atelier/works/ 2>/dev/null || true
          # HTML-/Astro-Werk-Verzeichnisse via Integrator (Pfad-Grenze erzwungen)
          npx tsx scripts/atelier/integrate.ts /tmp/atelier . > /tmp/report.json
          cat /tmp/report.json
          for f in PROTOCOL.md README.md REQUESTS.md; do [ -f "/tmp/atelier/$f" ] && cp "/tmp/atelier/$f" "src/content/atelier/$f" || true; done
          # Foundation-Anker (v4): wird auf /atelier/foundation wörtlich gerendert
          [ -f /tmp/atelier/docs/RESEARCH-FOUNDATION-V1.md ] && cp /tmp/atelier/docs/RESEARCH-FOUNDATION-V1.md src/content/atelier/ || true
          # Daten-Spine fürs Cockpit (Atlas + Puls) — read-only-Spiegel committeter Engine-JSONs
          mkdir -p src/data/atelier
          cp /tmp/atelier/atlas/atlas.json /tmp/atelier/pulse/*.json src/data/atelier/ 2>/dev/null || true

      - name: Validate (check + test + build)
        id: validate
        run: |
          set -o pipefail
          { npm run check && npm test && npm run build; } 2>&1 | tee /tmp/validate.log

      - name: Commit + let deploy-cf rebuild (on success)
        if: success()
        run: |
          if [ -n "$(git status --porcelain src/content/atelier src/components/atelier src/pages/atelier src/data/atelier public/atelier/werke-html)" ]; then
            git config user.name "Atelier-Integrate"
            git config user.email "atelier-integrate@frankbueltge.de"
            git add -A src/content/atelier src/components/atelier src/pages/atelier src/data/atelier
            if [ -d public/atelier/werke-html ]; then git add -A public/atelier/werke-html; fi
            git commit -m "atelier: integrate $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "no changes"
          fi

      - name: Rejection feedback to the engine repo (green builds too)
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.ATELIER_BOT_TOKEN }}
        run: |
          FEEDBACK=$(npx tsx scripts/atelier/rejection-feedback.ts /tmp/report.json atelier || true)
          if [ -n "$FEEDBACK" ] && [ -n "$BOT_TOKEN" ]; then
            DATE=$(date -u +%F)
            (
              git clone --depth 1 "https://x-access-token:${BOT_TOKEN}@github.com/frankbueltge/ulysses" /tmp/fb-rej
              mkdir -p /tmp/fb-rej/atelier-feedback
              printf '%s\n' "$FEEDBACK" > "/tmp/fb-rej/atelier-feedback/${DATE}-rejections.md"
              cd /tmp/fb-rej && git config user.name "Atelier-Integrate" && git config user.email "atelier-integrate@frankbueltge.de"
              git add atelier-feedback && git commit -m "feedback: works rejected at the gate ${DATE}" && git push
            ) || echo "rejection feedback skipped (non-fatal)"
          else
            echo "no rejections (or no BOT_TOKEN) — nothing to feed back"
          fi

      - name: On failure — feedback to her repo + issue to Frank
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.ATELIER_BOT_TOKEN }}
        run: |
          DATE=$(date -u +%F)
          LOG=$(tail -40 /tmp/validate.log 2>/dev/null || echo "see workflow run")
          # Issue an Frank ZUERST — läuft immer, auch wenn der BOT_TOKEN-Block unten fehlschlägt.
          gh issue create --repo frankbueltge/frankbueltge.de \
            --title "Atelier-Integrate rot ($DATE)" \
            --body "Der nächtliche Atelier-Build ist fehlgeschlagen; kein Deploy. Log-Auszug im Workflow-Lauf. Feedback wurde in ulysses/atelier-feedback/${DATE}.md geschrieben." || true
          # Feedback in IHR Repo (sie liest es nächste Sitzung) — defensiv: Fehler hier
          # dürfen das Issue-Erstellen oben nicht blockieren (daher nachgelagert + || true).
          if [ -n "$BOT_TOKEN" ]; then
            (
              git clone --depth 1 "https://x-access-token:${BOT_TOKEN}@github.com/frankbueltge/ulysses" /tmp/fb
              mkdir -p /tmp/fb/atelier-feedback
              printf '# Build-Feedback %s\n\nDein letzter Beitrag hat das Gate nicht bestanden (kein Deploy; letzter guter Stand bleibt live). Auszug:\n\n```\n%s\n```\n\nKorrigiere das betroffene Werk in `works/<slug>/` und committe erneut.\n' "$DATE" "$LOG" > "/tmp/fb/atelier-feedback/${DATE}.md"
              cd /tmp/fb && git config user.name "Atelier-Integrate" && git config user.email "atelier-integrate@frankbueltge.de"
              git add atelier-feedback && git commit -m "feedback: Build $DATE rot" && git push
            ) || echo "feedback push skipped (non-fatal)"
          fi
