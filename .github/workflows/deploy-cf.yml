name: Deploy to Cloudflare Pages

# Baut auf GitHubs Runnern (gratis) und deployt das statische dist/ zu Cloudflare Pages.
# Läuft bei jedem Push auf main UND nach jedem nächtlichen Cron-Workflow (workflow_run).
# Letzteres ist nötig, weil Pushes mit dem eingebauten GITHUB_TOKEN (so committen die
# Cron-Jobs) per GitHubs Anti-Rekursions-Regel KEIN `on: push` auslösen — sonst ginge die
# nächtliche Kunst nicht live. CF Pages serviert nur Statik (keine harten Anbieter-Sperren).
#
# BENÖTIGT ein Repository-Secret (Settings → Secrets and variables → Actions):
#   CF — Cloudflare-API-Token mit „Cloudflare Pages: Edit"
# (Die Account-ID ist nicht geheim und steht direkt unten.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - Protokoll nightly
      - Prämie nightly
      - Parallaxe nightly
      - Round Number nightly
      - Ghost Fleet nightly
      - Redaction nightly
      - Gegenmessung nightly
      - ueberflug-refresh
      - Atelier integrate
      - Field integrate
      - Studio integrate
      - Plenum integrate
      - Beifang weekly
      - Spielraum watch
    types: [completed]

permissions:
  contents: read

concurrency:
  group: cf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    # push/workflow_dispatch: immer. workflow_run: nur wenn der Cron erfolgreich war
    # (sonst löste auch ein fehlgeschlagener Nightly einen Deploy aus).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Deploy → Cloudflare Pages
        env:
          CF_TOKEN_RAW: ${{ secrets.CF }}
          CLOUDFLARE_ACCOUNT_ID: '991a2a1a4a288564f3bd05ff01476a30'
        run: |
          # Secret kann beim Einfügen ein \n/Leerzeichen enthalten → trimmen (sonst „invalid header value").
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CF_TOKEN_RAW" | tr -d '[:space:]')"
          npx --yes wrangler@4 pages deploy dist --project-name=frankbueltge-de --branch=main --commit-dirty=true
