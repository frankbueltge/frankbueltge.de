name: Deploy to Cloudflare Pages

# Baut auf GitHubs Runnern (gratis) und deployt das statische dist/ zu Cloudflare Pages.
# Läuft bei jedem Push auf main — also auch nach jedem nächtlichen Cron-Commit → tägliche
# Updates automatisch live. Keine harten Anbieter-Sperren (CF Pages serviert nur Statik).
#
# BENÖTIGT ein Repository-Secret (Settings → Secrets and variables → Actions):
#   CF — Cloudflare-API-Token mit „Cloudflare Pages: Edit"
# (Die Account-ID ist nicht geheim und steht direkt unten.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Deploy → Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF }}
          CLOUDFLARE_ACCOUNT_ID: '991a2a1a4a288564f3bd05ff01476a30'
        run: npx --yes wrangler@4 pages deploy dist --project-name=frankbueltge-de --branch=main --commit-dirty=true
