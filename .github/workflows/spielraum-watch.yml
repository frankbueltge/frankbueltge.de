name: Spielraum watch

# Monatlicher Watcher: prüft die bekannten Hyperscaler-Report-Landingpages auf Neues
# (Fingerprint aus Report-Links + Jahres-/Fiskal-Tokens) und meldet Änderungen per Issue.
# Parst KEINE PDFs, schreibt NIE ans Daten-Register (src/data/spielraum/register.json) —
# der Ingest ist ein manueller, verifizierter Schritt in einer eigenen Session.

on:
  schedule:
    - cron: '17 6 3 * *' # monatlich am 3. um 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: spielraum-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pipeline-Paket installieren
        run: pip install --no-cache-dir ./pipelines/protokoll
      - name: Watch laufen (schreibt watch.json + Zusammenfassung, committet nicht)
        run: python -m protokoll.spielraum.run --repo-root . --summary-out /tmp/spielraum-summary.json
      - name: Committen
        run: |
          git config user.name "Gegenmessung"
          git config user.email "gegenmessung@frankbueltge.de"
          git add src/data/spielraum/watch.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen."; exit 0
          fi
          git commit -m "spielraum: Berichtslage geprüft $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Gepusht."; exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen, neu …"; sleep 5
          done
          echo "::error::Push nach 5 Versuchen fehlgeschlagen"; exit 1
      - name: Issue bei Änderung oder anhaltendem Ausfall
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create spielraum --repo frankbueltge/frankbueltge.de --description "Spielraum: Report-Watcher" --color "555555" 2>/dev/null || true
          NEEDED=$(jq -r '.issue_needed' /tmp/spielraum-summary.json)
          if [ "$NEEDED" = "true" ]; then
            TITLE=$(jq -r '.title' /tmp/spielraum-summary.json)
            OPEN=$(gh issue list --repo frankbueltge/frankbueltge.de --label spielraum --state open --json number --jq 'length')
            if [ "$OPEN" -eq 0 ]; then
              jq -r '.body' /tmp/spielraum-summary.json > /tmp/spielraum-body.md
              gh issue create --repo frankbueltge/frankbueltge.de --label spielraum --title "$TITLE" --body-file /tmp/spielraum-body.md
            else
              # Nie still: eine im Folgemonat erkannte Änderung darf nicht spurlos
              # verschwinden, nur weil watch.json den Fingerprint trotzdem fortschreibt —
              # sie wird als Kommentar ans älteste offene spielraum-Issue gehängt.
              NUM=$(gh issue list --repo frankbueltge/frankbueltge.de --label spielraum --state open --json number --jq '.[0].number')
              { printf '**%s**\n\n' "$TITLE"; jq -r '.body' /tmp/spielraum-summary.json; } > /tmp/spielraum-comment.md
              gh issue comment "$NUM" --repo frankbueltge/frankbueltge.de --body-file /tmp/spielraum-comment.md
            fi
          fi
