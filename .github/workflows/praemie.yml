name: Prämie nightly

# „Police" — Prämie / Schadenverlauf / laufende Regulierung / Rückzug, eine kanonische Police.
# Schreibt src/data/praemie/police.json und committet zurück (→ Rebuild).
# Ersetzt den früheren Cloud-Run-Job (gleiches 04:00-UTC-Fenster). Keine Secrets, kein GCP.

on:
  schedule:
    - cron: '0 4 * * *' # täglich 04:00 UTC (wie zuvor der Cloud-Run-Job)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: praemie
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pipeline-Paket installieren
        run: pip install --no-cache-dir ./pipelines/protokoll
      - name: Prämie laufen (schreibt, committet nicht)
        run: python -m protokoll.praemie.run --dry-run --repo-root .
      - name: Committen
        run: |
          git config user.name "Protokollführung"
          git config user.email "protokoll@frankbueltge.de"
          git add src/data/praemie 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Keine Änderungen."; exit 0
          fi
          git commit -m "prämie: Police vom $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Gepusht."; exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen, neu …"; sleep 5
          done
          echo "::error::Push nach 5 Versuchen fehlgeschlagen"; exit 1
