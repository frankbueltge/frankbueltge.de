# .github/workflows/requests-watchdog.yml
# Franks Posteingang für die REQUESTS-Kanäle (16.07. nachts, Frank: "ich muss die requests
# irgendwie bekommen"). Die Kollektive schreiben Anfragen an Frank in ihre REQUESTS.md —
# bisher las die niemand zuverlässig (Session 17 legte z. B. die Playthrough-Einladung dort
# ab). Dieser Wächter liest zweimal täglich die REQUESTS.md aller vier Praktiken und macht
# aus jedem NEUEN Abschnitt (##-Überschrift) ein Issue in diesem Repo — GitHub-Notifications
# sind der Sockel; die Steuerzentrale sitzt oben drauf. Dedupe über exakten Titelvergleich
# gegen die komplette Issue-Liste (offen ODER geschlossen — ein geschlossenes Issue alarmiert
# nie wieder; die frühere Such-Phrase brach an Anführungszeichen im Titel → Duplikate).
# Team-eigene Sections (Seeds/Team note/Team responses) sind Franks eigene Worte und werden
# übersprungen (Muster gespiegelt in src/lib/zentrale/requestsMd.ts TEAM_SECTION_RE).
# Abschnitte mit führendem Datum älter als 10 Tage gelten als Bestand und bleiben stumm.
#
# Zweiter Job (saat-sync, seit 2026-07-20): derselbe 2×-täglich-Rhythmus trägt auch den
# Status-Rückfluss der "Öffentlichen Saat" (Design-Spec 2026-07-20 §5) — scripts/saat/sync.ts
# liest dieselben drei Engine-REQUESTS.md roh von raw.githubusercontent.com (kein Token, wie
# oben) und synct Praxis-Antworten aus "Seeds from the public" ins Register
# (src/data/saat/register.json), das dieser Job dann committet. Eigener Job statt eines Steps
# im bestehenden `watch`-Job, damit dessen reine Python/gh-Logik unangetastet bleibt.
name: Requests watchdog

on:
  schedule:
    - cron: '15 6 * * *'    # 08:15 Berlin — nach den Nightly-Netzen
    - cron: '15 21 * * *'   # 23:15 Berlin — nach den Abend-Sessions
  workflow_dispatch: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Scan engine REQUESTS.md files for new sections
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, re, subprocess, sys, urllib.request
          from datetime import date, timedelta

          CUTOFF = date.today() - timedelta(days=10)
          REPOS = ["irrtum-als-methode", "field-research", "studio", "data-snack-plenum"]
          # Spiegel von TEAM_SECTION_RE (src/lib/zentrale/requestsMd.ts): Team-eigene Sections.
          TEAM_SECTION = re.compile(r"^(seeds\b|team note\b|team responses\b)", re.I)

          def sh(args, inp=None):
              return subprocess.run(args, input=inp, capture_output=True, text=True)

          # Dedupe: ALLE Issue-Titel einmal holen und exakt vergleichen — die Such-API
          # zerbricht an Anführungszeichen/Sonderzeichen in der Phrase und ließ Duplikate durch.
          existing = sh(["gh", "issue", "list", "--repo", "frankbueltge/frankbueltge.de",
                         "--state", "all", "--limit", "1000", "--json", "title"])
          if existing.returncode != 0:
              sys.exit(f"Issue-Liste nicht lesbar: {existing.stderr.strip()[:200]}")
          known_titles = {i["title"] for i in json.loads(existing.stdout or "[]")}

          for repo in REPOS:
              url = f"https://raw.githubusercontent.com/frankbueltge/{repo}/main/REQUESTS.md"
              try:
                  text = urllib.request.urlopen(url, timeout=30).read().decode()
              except Exception as e:
                  print(f"{repo}: REQUESTS.md nicht lesbar ({e}) — übersprungen")
                  continue
              # Abschnitte: '## <heading>' bis zur nächsten ##-Überschrift
              parts = re.split(r"^## ", text, flags=re.M)[1:]
              for part in parts:
                  heading, _, body = part.partition("\n")
                  heading = heading.strip()
                  # Team-eigene Sections: Franks Seeds/Notes/Responses sind keine Anfragen an ihn
                  if TEAM_SECTION.match(heading):
                      continue
                  # Bestandsschutz: führendes Datum älter als CUTOFF → stumm
                  m = re.match(r"(\d{4})-(\d{2})-(\d{2})", heading)
                  if m and date(*map(int, m.groups())) < CUTOFF:
                      continue
                  title = f"Request aus {repo}: {heading}"[:200]
                  if title in known_titles:
                      continue
                  known_titles.add(title)
                  excerpt = "\n".join(body.strip().splitlines()[:40])
                  issue_body = (
                      f"Neuer Eintrag in `{repo}/REQUESTS.md`:\n\n## {heading}\n\n{excerpt}\n\n---\n"
                      f"Quelle: https://github.com/frankbueltge/{repo}/blob/main/REQUESTS.md\n"
                      f"(Requests-Watchdog — Issue schließen = gelesen/erledigt; es alarmiert nie erneut.)"
                  )
                  made = sh(["gh", "issue", "create", "--repo", "frankbueltge/frankbueltge.de",
                             "--title", title, "--body", issue_body])
                  print(f"{repo}: {'ISSUE ' + made.stdout.strip() if made.returncode == 0 else 'FEHLER ' + made.stderr.strip()} — {heading[:60]}")
          PYEOF

  saat-sync:
    # Status-Rückfluss "Öffentliche Saat" (Spec 2026-07-20 §5): synct Praxis-Antworten aus
    # "Seeds from the public" ins Register. Braucht Checkout + Node, weil es (anders als
    # `watch` oben) Dateien im Site-Repo selbst liest und schreibt.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: saat-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle History → git pull --rebase im Commit-Schritt funktioniert
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Register-Sync aus den Engine-REQUESTS.md (roh, kein Token — öffentliche Repos)
        run: npx tsx scripts/saat/sync.ts
      - name: Committen, wenn geändert
        run: |
          git config user.name "Öffentliche Saat"
          git config user.email "saat@frankbueltge.de"
          git add src/data/saat/register.json
          if git diff --cached --quiet; then
            echo "Keine Änderung."; exit 0
          fi
          git commit -m "saat: register-sync $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Gepusht."; exit 0
            fi
            echo "Push-Versuch $i fehlgeschlagen, neu …"; sleep 5
          done
          echo "::error::Push nach 5 Versuchen fehlgeschlagen"; exit 1
