# .github/workflows/field-integrate.yml
# Pulls the field-research repo, integrates ONLY allowed paths (path boundary) into the `field`
# namespace, validates check/test/build, and lets deploy-cf rebuild only on green. On red: no
# deploy (last good state stays), a feedback file back into the engine's repo + an issue to Frank.
# Sibling of atelier-integrate.yml (Ulysses); same integrator, ns='field'.
name: Field integrate

on:
  # Promptness: integrate immediately once the engine lands something on its main —
  # cross-repo via repository_dispatch from the engine's auto-land.yml.
  repository_dispatch:
    types: [field-landed]
  schedule:
    - cron: '30 3 * * *'   # safety net if the dispatch fails (offset from atelier's 03:00)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: field-integrate

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - name: Clone field-research repo
        run: git clone --depth 1 https://github.com/frankbueltge/field-research /tmp/field

      - name: Integrate works (html + astro + md) + sync journal/docs
        # Path boundary: only journal/, works/*.md, work directories (via the integrator) and the
        # five doc files below are ever copied. drafts/, memory/ and WORKBOARD.md are intentionally
        # excluded — unvetted collective work stays in the engine repo and never reaches the site.
        run: |
          echo "guard: drafts/, memory/, WORKBOARD.md are intentionally excluded from this copy — unvetted work stays in the engine repo"
          # Full reset of the generated work outputs → the site mirrors the engine exactly
          # (removed/renamed works leave no orphans).
          rm -rf src/content/field/works src/components/field/werke src/pages/field/werke public/field/werke-html
          mkdir -p src/content/field/journal src/content/field/works src/components/field/werke
          touch src/components/field/werke/.gitkeep
          # Mirror the journal (removes deleted entries)
          rsync -a --delete /tmp/field/journal/ src/content/field/journal/
          # Markdown works
          cp /tmp/field/works/*.md src/content/field/works/ 2>/dev/null || true
          # HTML/Astro work directories via the integrator (path boundary enforced), ns=field
          npx tsx scripts/atelier/integrate.ts /tmp/field . field > /tmp/report.json
          cat /tmp/report.json
          for f in PROTOCOL.md README.md REQUESTS.md FIELD.md SITE-API.md; do [ -f "/tmp/field/$f" ] && cp "/tmp/field/$f" "src/content/field/$f" || true; done

      - name: Validate (check + test + build)
        id: validate
        run: |
          set -o pipefail
          { npm run check && npm test && npm run build; } 2>&1 | tee /tmp/validate.log

      - name: Commit + let deploy-cf rebuild (on success)
        if: success()
        run: |
          if [ -n "$(git status --porcelain src/content/field src/components/field src/pages/field public/field/werke-html)" ]; then
            git config user.name "Field-Integrate"
            git config user.email "field-integrate@users.noreply.github.com"
            git add -A src/content/field src/components/field src/pages/field
            if [ -d public/field/werke-html ]; then git add -A public/field/werke-html; fi
            git commit -m "field: integrate $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "no changes"
          fi

      - name: On failure — feedback to the engine's repo + issue to Frank
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.FIELD_BOT_TOKEN }}
        run: |
          DATE=$(date -u +%F)
          LOG=$(tail -40 /tmp/validate.log 2>/dev/null || echo "see workflow run")
          # Issue to Frank FIRST — always runs, even if the BOT_TOKEN block below fails.
          gh issue create --repo frankbueltge/frankbueltge.de \
            --title "Field-Integrate red ($DATE)" \
            --body "The nightly field build failed; no deploy. Log excerpt in the workflow run. Feedback was written to field-research/field-feedback/${DATE}.md." || true
          # Feedback into the engine's repo (it reads it next session) — defensive: errors here
          # must not block the issue creation above (hence || true).
          if [ -n "$BOT_TOKEN" ]; then
            (
              git clone --depth 1 "https://x-access-token:${BOT_TOKEN}@github.com/frankbueltge/field-research" /tmp/fb
              mkdir -p /tmp/fb/field-feedback
              printf '# Build feedback %s\n\nYour last contribution did not pass the gate (no deploy; the last good state stays live). Excerpt:\n\n```\n%s\n```\n\nFix the affected work in `works/<slug>/` and commit again.\n' "$DATE" "$LOG" > "/tmp/fb/field-feedback/${DATE}.md"
              cd /tmp/fb && git config user.name "Field-Integrate" && git config user.email "field-integrate@users.noreply.github.com"
              git add field-feedback && git commit -m "feedback: build $DATE red" && git push
            ) || echo "feedback push skipped (non-fatal)"
          fi
