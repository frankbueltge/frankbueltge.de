task_id: M2-T03
title: Implement research designs, identification audits and claim ceilings
status: approved
objective: Implement ResearchDesign comparison, IdentificationAudit state machine, substantive kill conditions
  and machine-enforced claim-language ceilings integrated with the existing Claim Service.
source_of_truth:
- docs/10_CAUSAL_INFERENCE_AND_DESIGN.md
- docs/adr/ADR-0004-CAUSAL-CLAIM-GATES.md
- schemas/research-design.schema.json
- schemas/identification-audit.schema.json
- acceptance/method-causal-claim-gate.feature
