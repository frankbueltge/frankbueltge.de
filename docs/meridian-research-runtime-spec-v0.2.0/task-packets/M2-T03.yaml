allowed_paths:
- packages/method-kernel/design/**
- packages/method-kernel/identification/**
- packages/policy/claim_ceiling/**
- packages/domain/claims/**
- tests/unit/design/**
- tests/integration/claim_ceiling/**
forbidden_changes:
- single global design score
- significance-based promotion
- silent design deletion
- narrative-only kill conditions
invariants:
- audit precedes primary causal execution
- audit ceiling is authoritative for machine language
- failed audit can downgrade or kill but never disappear
- overrides are explicit and cannot erase failed gates
acceptance_tests:
- execute all scenarios in method-causal-claim-gate.feature
- downgraded housing audit blocks causal claim
- failed audit cancels eligible primary execution
- rejected designs remain queryable
required_output:
- implementation summary mapped to requirement IDs
- changed files
- commands and test results
- remaining risks and explicit non-implementation notes
stop_conditions:
- Claim Service cannot accept method-derived ceilings without weakening existing evidence gates
- override path can bypass the audit without an event
