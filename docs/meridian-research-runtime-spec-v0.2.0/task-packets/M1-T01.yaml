  unresolved terms and preventing direct transition from prose to execution.
source_of_truth:
- docs/09_QUESTION_AND_CONCEPT_COMPILATION.md
- schemas/question-model.schema.json
- examples/housing-populism/question-model.json
- acceptance/method-preanalysis-lock.feature
